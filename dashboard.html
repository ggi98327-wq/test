<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>방문자 대시보드</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }
    .dashboard {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .header {
      margin-bottom: 24px;
    }
    .header h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .card {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      padding: 24px;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-4px);
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .card-value {
      font-size: 2.4rem;
      font-weight: 800;
      color: #111827;
      margin: 0;
    }
    .card-note {
      margin-top: 10px;
      color: #6b7280;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>방문자 수 대시보드</h1>
    </div>
    <div class="cards">
      <div class="card" id="totalVisitorsCard">
        <div>
          <div class="card-title">총 방문자 수</div>
          <p class="card-value" id="totalVisitors">0</p>
        </div>
        <div class="card-note">전체 누적 방문자 수입니다.</div>
      </div>
      <div class="card" id="dailyVisitorsCard">
        <div>
          <div class="card-title">하루 방문자 수</div>
          <p class="card-value" id="dailyVisitors">0</p>
        </div>
        <div class="card-note">오늘 하루 기준 방문자 수입니다.</div>
      </div>
      <div class="card" id="monthlyVisitorsCard">
        <div>
          <div class="card-title">한달 방문자 수</div>
          <p class="card-value" id="monthlyVisitors">0</p>
        </div>
        <div class="card-note">최근 30일 간 방문자 수입니다.</div>
      </div>
      <div class="card" id="annualVisitorsCard">
        <div>
          <div class="card-title">1년 방문자 수</div>
          <p class="card-value" id="annualVisitors">0</p>
        </div>
        <div class="card-note">최근 365일 간 방문자 수입니다.</div>
      </div>
    </div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
